name: Bug report
description: Report a reproducible problem in DevBoard
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Open…\n2. Enter…\n3. See…"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
    validations:
      required: true
